<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Enhancer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <span class="header-icon">✨</span>
        <h1 class="header-title">Prompt Enhancer</h1>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="enhance">Enhance</button>
      <button class="tab" data-tab="history">History</button>
    </nav>

    <!-- Enhance Tab -->
    <section id="tab-enhance" class="tab-content active">
      <!-- Template Selector -->
      <div class="form-group">
        <label class="label">Template</label>
        <div class="template-grid" id="template-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Enhancement Level -->
      <div class="form-group">
        <label class="label">Enhancement Level</label>
        <div class="level-selector">
          <button class="level-btn" data-level="light">
            <span class="level-icon">🌱</span>
            <span>Light</span>
          </button>
          <button class="level-btn active" data-level="medium">
            <span class="level-icon">⚡</span>
            <span>Medium</span>
          </button>
          <button class="level-btn" data-level="aggressive">
            <span class="level-icon">🚀</span>
            <span>Aggressive</span>
          </button>
        </div>
      </div>

      <!-- Quick Enhance -->
      <div class="form-group">
        <label class="label">Quick Enhance</label>
        <textarea id="prompt-input" class="textarea" placeholder="Paste your prompt here..." rows="4"></textarea>
      </div>

      <button id="enhance-btn" class="btn-primary">
        <span class="btn-icon">✨</span>
        <span>Enhance Prompt</span>
      </button>

      <!-- Result -->
      <div id="result-section" class="result-section hidden">
        <div class="result-header">
          <label class="label">Enhanced Prompt</label>
          <button id="copy-btn" class="copy-btn" title="Copy to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span>Copy</span>
          </button>
        </div>
        <div id="result-text" class="result-text"></div>
      </div>
    </section>

    <!-- History Tab -->
    <section id="tab-history" class="tab-content">
      <div id="history-list" class="history-list">
        <div class="history-empty">
          <span class="history-empty-icon">📋</span>
          <p>No enhancements yet</p>
          <p class="text-muted">Enhanced prompts will appear here</p>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-status" id="status-indicator">
        <span class="status-dot"></span>
        <span id="status-text">Template Mode</span>
      </span>
      <span class="footer-version">v1.0.0</span>
    </footer>
  </div>

  <script src="../lib/enhancer.js"></script>
  <script src="../lib/templates.js"></script>
  <script src="popup.js"></script>
</body>
</html>
